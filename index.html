<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard 1001 Discos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e74c3c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="1001 Discos">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/26/26805.png">

    <style>
        :root {
            --primary: #e74c3c;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #f1c40f;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; width: 100%; max-width: 1000px; }
        h1 { color: var(--primary); font-size: 2.2rem; margin-bottom: 5px; }
        .sub { color: #888; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Painel de Controle */
        .controls { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            display: flex; flex-wrap: wrap; gap: 15px; 
            width: 100%; max-width: 1000px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 220px; }
        label { font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; }
        
        select { 
            background: #2a2a2a; border: 1px solid #444; color: white; 
            padding: 12px; border-radius: 8px; outline: none; transition: 0.3s;
            cursor: pointer;
        }

        /* Barra de Pesquisa com Lupa */
        .search-container {
            display: flex;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
        }
        .search-container:focus-within { border-color: var(--primary); }
        .search-container input {
            background: transparent; border: none; color: white; padding: 12px;
            flex: 1; outline: none; font-size: 1rem;
        }
        .btn-search {
            background: var(--primary); border: none; color: white;
            padding: 0 15px; cursor: pointer; transition: 0.3s;
            font-size: 1.1rem;
        }
        .btn-search:hover { background: #c0392b; }

        /* Grid de Discos */
        #lista-discos { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; width: 100%; max-width: 1000px; 
        }

        .album-card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px; 
            border: 1px solid #333; transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .album-card:hover { border-color: var(--primary); transform: translateY(-3px); }

        .album-id { color: var(--primary); font-weight: bold; font-size: 0.8rem; margin-bottom: 5px; }
        .album-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 3px; color: #fff; line-height: 1.2; }
        .album-artist { color: #888; margin-bottom: 15px; font-size: 0.95rem; }

        /* Estrelas Corrigidas */
        .rating-section { margin-top: auto; border-top: 1px solid #333; padding-top: 15px; }
        .rating-title { font-size: 0.7rem; color: #555; text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        .star-rating { display: flex; gap: 4px; margin-bottom: 12px; flex-direction: row-reverse; justify-content: flex-end; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 26px; color: #333; cursor: pointer; transition: 0.2s; }
        
        /* Lógica das Estrelas */
        .star-rating input:checked ~ label { color: #333; } 
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked + label,
        .star-rating input:checked + label ~ label { color: var(--accent) !important; }

        .btn-save { 
            background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 12px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;
        }
        .btn-save:hover { background: var(--primary); border-color: var(--primary); }

        #toast { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 25px; border-radius: 50px; display: none; 
            z-index: 1000; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>1001 DISCOS</h1>
        <div class="sub">Plano de Progresso Musical</div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Pesquisar Álbum ou Artista</label>
            <div class="search-container">
                <input type="text" id="inputBusca" placeholder="Ex: Pink Floyd, 0001..." onkeyup="if(event.key === 'Enter') filtrarDados()">
                <button class="btn-search" onclick="filtrarDados()">🔍</button>
            </div>
        </div>
        <div class="control-group">
            <label>Filtrar por Década</label>
            <select id="selectDecada" onchange="filtrarDados()">
                <option value="">Todas as décadas</option>
                <option value="1950">1950s</option>
                <option value="1960">1960s</option>
                <option value="1970">1970s</option>
                <option value="1980">1980s</option>
                <option value="1990">1990s</option>
                <option value="2000">2000s</option>
            </select>
        </div>
        <div class="control-group">
            <label>Status de Escuta</label>
            <select id="selectStatus" onchange="filtrarDados()">
                <option value="">Todos os discos</option>
                <option value="Ouvido">Já ouvidos</option>
                <option value="Pendente">Ainda pendentes</option>
            </select>
        </div>
    </div>

    <div id="lista-discos">
        <p style="text-align: center; width: 100%; color: #666;">Sincronizando banco de dados...</p>
    </div>
    
    <div id="toast"></div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbzbNp4QIWH9wuAoqgCkhK8Hh8PNaKQ8N8ksUk1HOKocpPRQY16b-DY3NR-62-dnKpuzpw/exec"; 
        let database = [];

        // Inicialização: Puxa os dados da planilha
        fetch(URL_API)
            .then(res => res.json())
            .then(dados => {
                database = dados;
                filtrarDados();
            })
            .catch(err => console.error("Erro ao conectar com a planilha:", err));

        function filtrarDados() {
            const busca = document.getElementById('inputBusca').value.toLowerCase().trim();
            const decada = document.getElementById('selectDecada').value;
            const status = document.getElementById('selectStatus').value;

            const filtrados = database.filter(d => {
                // Conversão segura para String para evitar erros com células vazias
                const artista = String(d.ARTISTA || "").toLowerCase();
                const album = String(d.ALBUM || "").toLowerCase();
                const idStr = String(d.ID || "");

                const matchBusca = busca === "" || artista.includes(busca) || album.includes(busca) || idStr.includes(busca);
                const matchDecada = decada === "" || String(d.DÉCADA) === decada;
                const matchStatus = status === "" || (status === "Ouvido" ? d.STATUS === "Ouvido" : d.STATUS !== "Ouvido");
                
                return matchBusca && matchDecada && matchStatus;
            });

            renderizar(filtrados);
        }

        function renderizar(lista) {
            const container = document.getElementById('lista-discos');
            container.innerHTML = lista.length === 0 ? '<p style="text-align:center; width:100%; color:#666;">Nenhum registro encontrado, parceiro.</p>' : '';

            lista.forEach(disco => {
                const card = document.createElement('div');
                card.className = 'album-card';
                const statusIcon = disco.STATUS === "Ouvido" ? "✔️" : "⏳";
                
                card.innerHTML = `
                    <div class="album-id">#${String(disco.ID).padStart(4, '0')} ${statusIcon}</div>
                    <div class="album-title">${disco.ALBUM}</div>
                    <div class="album-artist">${disco.ARTISTA} (${disco.DÉCADA})</div>
                    
                    <div class="rating-section">
                        <span class="rating-title">Qualidade Musical</span>
                        <div class="star-rating">${gerarEstrelas(disco.ID, 'mus', disco['NOTA MUSICAL'])}</div>
                        
                        <span class="rating-title">Gosto Pessoal</span>
                        <div class="star-rating">${gerarEstrelas(disco.ID, 'pes', disco['NOTA PESSOAL'])}</div>
                        
                        <button class="btn-save" onclick="salvar(${disco.ID}, this)">Salvar Registro</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function gerarEstrelas(id, tipo, notaAtual) {
            let html = '';
            for (let i = 5; i >= 1; i--) {
                const checked = i == notaAtual ? 'checked' : '';
                html += `
                    <input type="radio" id="${tipo}${i}_${id}" name="${tipo}_${id}" value="${i}" ${checked}>
                    <label for="${tipo}${i}_${id}">★</label>
                `;
            }
            return html;
        }

        function salvar(id, btn) {
            const mus = document.querySelector(`input[name="mus_${id}"]:checked`)?.value;
            const pes = document.querySelector(`input[name="pes_${id}"]:checked`)?.value;

            if (!mus || !pes) return alert("Marca as estrelas aí primeiro, mermão!");

            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = "ENVIANDO...";

            fetch(URL_API, {
                method: 'POST',
                body: JSON.stringify({ id, notaMusical: mus, notaPessoal: pes })
            })
            .then(() => {
                notify("Dossiê atualizado!", "#2ecc71");
                btn.innerHTML = "SALVO!";
                
                // Atualiza localmente para não precisar dar reload
                const idx = database.findIndex(d => d.ID == id);
                if(idx !== -1) {
                    database[idx].STATUS = "Ouvido";
                    database[idx]['NOTA MUSICAL'] = mus;
                    database[idx]['NOTA PESSOAL'] = pes;
                }
            })
            .catch(() => {
                notify("Erro na conexão!", "#e74c3c");
                btn.disabled = false;
                btn.innerHTML = "RECOMECAR";
            });
        }

        function notify(txt, color) {
            const t = document.getElementById('toast');
            t.innerText = txt;
            t.style.backgroundColor = color;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
