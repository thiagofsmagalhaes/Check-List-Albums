<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard 1001 Discos</title>
    <style>
        :root {
            --primary: #e74c3c;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #f1c40f;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; width: 100%; max-width: 1000px; }
        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }

        /* Painel de Controle (Filtros e Busca) */
        .controls { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            display: flex; flex-wrap: wrap; gap: 15px; 
            width: 100%; max-width: 1000px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 200px; }
        label { font-size: 0.85rem; font-weight: bold; color: #888; text-transform: uppercase; }
        
        select { 
            background: #2a2a2a; border: 1px solid #444; color: white; 
            padding: 12px; border-radius: 8px; outline: none; transition: 0.3s;
        }
        select:focus { border-color: var(--primary); background: #333; }

        /* Estilo Exclusivo da Barra de Pesquisa com Lupa */
        .search-box {
            display: flex;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
        }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 8px rgba(231, 76, 60, 0.3); }
        .search-box input {
            background: transparent; border: none; color: white; padding: 12px;
            flex: 1; outline: none; font-size: 1rem;
        }
        .btn-lupa {
            background: var(--primary); border: none; color: white;
            padding: 0 18px; font-size: 1.2rem; cursor: pointer; transition: 0.3s;
        }
        .btn-lupa:hover { background: #c0392b; }

        /* Grid de Discos */
        #lista-discos { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; width: 100%; max-width: 1000px; 
        }

        .album-card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px; 
            border: 1px solid #333; transition: transform 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column;
        }
        .album-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(231, 76, 60, 0.2); }

        .album-id { color: var(--primary); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        .album-title { font-size: 1.25rem; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .album-artist { color: #aaa; margin-bottom: 15px; font-style: italic; }

        /* Estrelas Corrigidas */
        .rating-container { margin-bottom: 15px; border-top: 1px solid #333; padding-top: 15px; }
        .rating-label { font-size: 0.8rem; color: #777; margin-bottom: 5px; display: block; }
        
        .star-rating { display: flex; gap: 5px; margin-bottom: 10px; flex-direction: row-reverse; justify-content: flex-end; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 24px; color: #444; cursor: pointer; transition: 0.2s; }
        
        .star-rating input:checked ~ label { color: #444; } 
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked + label,
        .star-rating input:checked + label ~ label { color: var(--accent) !important; }

        .btn-salvar { 
            background: var(--primary); color: white; border: none; padding: 12px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
            margin-top: auto;
        }
        .btn-salvar:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-salvar:disabled { background: #555; cursor: not-allowed; }

        #status-msg { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; display: none; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>1001 Discos Para Ouvir Antes de Morrer</h1>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Pesquisa</label>
            <div class="search-box">
                <input type="text" id="inputBusca" placeholder="Artista, Álbum ou ID..." onkeyup="if(event.key === 'Enter') filtrarDados()">
                <button class="btn-lupa" onclick="filtrarDados()" title="Pesquisar">🔍</button>
            </div>
        </div>
        <div class="control-group">
            <label>Década</label>
            <select id="selectDecada" onchange="filtrarDados()">
                <option value="">Todas</option>
                <option value="1950">1950s</option>
                <option value="1960">1960s</option>
                <option value="1970">1970s</option>
                <option value="1980">1980s</option>
                <option value="1990">1990s</option>
                <option value="2000">2000s</option>
            </select>
        </div>
        <div class="control-group">
            <label>Status</label>
            <select id="selectStatus" onchange="filtrarDados()">
                <option value="">Todos</option>
                <option value="Ouvido">Ouvidos</option>
                <option value="Pendente">Pendentes</option>
            </select>
        </div>
    </div>

    <div id="lista-discos">
        <p style="text-align: center; width: 100%;">Carregando banco de dados...</p>
    </div>
    
    <div id="status-msg"></div>

    <script>
        // COLOQUE SUA URL AQUI:
        const URL_API = "https://script.google.com/macros/s/AKfycbzbNp4QIWH9wuAoqgCkhK8Hh8PNaKQ8N8ksUk1HOKocpPRQY16b-DY3NR-62-dnKpuzpw/exec"; 
        let database = [];

        // Inicialização
        fetch(URL_API)
            .then(res => res.json())
            .then(dados => {
                database = dados;
                filtrarDados(); // Mostra tudo ao carregar
            });

        function filtrarDados() {
            // Pegamos o valor e removemos espaços extras nas pontas
            const busca = document.getElementById('inputBusca').value.toLowerCase().trim();
            const decada = document.getElementById('selectDecada').value;
            const status = document.getElementById('selectStatus').value;

            const filtrados = database.filter(d => {
                // TRATAMENTO DE ERRO: Converte tudo para texto (String) antes de pesquisar.
                // Isso evita que a pesquisa quebre se a célula no Excel estiver vazia (null/undefined)
                const artista = String(d.ARTISTA || "").toLowerCase();
                const album = String(d.ALBUM || "").toLowerCase();
                const idStr = String(d.ID || "");

                // Verifica se o texto digitado está dentro do artista, do álbum ou é o ID exato
                const matchBusca = busca === "" || artista.includes(busca) || album.includes(busca) || idStr.includes(busca);
                
                // Tratamento seguro para Década e Status
                const matchDecada = decada === "" || String(d.DÉCADA) === decada;
                const matchStatus = status === "" || (status === "Ouvido" ? d.STATUS === "Ouvido" : d.STATUS !== "Ouvido");
                
                return matchBusca && matchDecada && matchStatus;
            });

            renderizar(filtrados);
        }

        function renderizar(lista) {
            const container = document.getElementById('lista-discos');
            container.innerHTML = lista.length === 0 ? '<p style="text-align:center; width:100%;">Nenhum disco encontrado na busca, mermão.</p>' : '';

            lista.forEach(disco => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <div class="album-id">#${String(disco.ID).padStart(4, '0')}</div>
                    <div class="album-title">${disco.ALBUM}</div>
                    <div class="album-artist">${disco.ARTISTA} (${disco.DÉCADA})</div>
                    
                    <div class="rating-container">
                        <span class="rating-label">Qualidade Musical</span>
                        <div class="star-rating">${gerarEstrelas(disco.ID, 'mus', disco['NOTA MUSICAL'])}</div>
                        
                        <span class="rating-label">Gosto Pessoal</span>
                        <div class="star-rating">${gerarEstrelas(disco.ID, 'pes', disco['NOTA PESSOAL'])}</div>
                    </div>

                    <button class="btn-salvar" onclick="salvar(${disco.ID}, this)">REGISTRAR ESCUTA</button>
                `;
                container.appendChild(card);
            });
        }

        function gerarEstrelas(id, tipo, notaAtual) {
            let html = '';
            for (let i = 5; i >= 1; i--) {
                const checked = i == notaAtual ? 'checked' : '';
                html += `
                    <input type="radio" id="${tipo}${i}_${id}" name="${tipo}_${id}" value="${i}" ${checked}>
                    <label for="${tipo}${i}_${id}">★</label>
                `;
            }
            return html;
        }

        function salvar(id, btn) {
            const mus = document.querySelector(`input[name="mus_${id}"]:checked`)?.value;
            const pes = document.querySelector(`input[name="pes_${id}"]:checked`)?.value;

            if (!mus || !pes) return alert("Parceiro, marca as estrelas antes de salvar o dossiê!");

            btn.disabled = true;
            btn.innerHTML = "SALVANDO...";

            fetch(URL_API, {
                method: 'POST',
                body: JSON.stringify({ id, notaMusical: mus, notaPessoal: pes })
            })
            .then(() => {
                showMsg("Boa! Planilha atualizada com sucesso.", "#2ecc71");
                btn.innerHTML = "ATUALIZADO!";
                
                const idx = database.findIndex(d => d.ID == id);
                if(idx !== -1) {
                    database[idx].STATUS = "Ouvido";
                    database[idx]['NOTA MUSICAL'] = mus;
                    database[idx]['NOTA PESSOAL'] = pes;
                }
            })
            .catch(() => {
                showMsg("Deu erro na conexão com o Google Sheets!", "#e74c3c");
                btn.disabled = false;
                btn.innerHTML = "TENTAR DE NOVO";
            });
        }

        function showMsg(txt, color) {
            const m = document.getElementById('status-msg');
            m.innerText = txt;
            m.style.backgroundColor = color;
            m.style.display = 'block';
            setTimeout(() => m.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
