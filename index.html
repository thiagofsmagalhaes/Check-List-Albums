<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada 1001 Discos</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a1a1a; 
            color: #f4f4f4; 
            padding: 20px; 
            max-width: 900px; 
            margin: 0 auto;
        }
        h1 { text-align: center; color: #e74c3c; }
        #carregando { text-align: center; font-style: italic; margin-top: 50px; }
        
        .album-card { 
            background: #2c2c2c; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-left: 5px solid #e74c3c;
        }
        .album-card h3 { margin-top: 0; color: #fff; }
        
        .info-layout { display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 15px; }
        .status-tag { font-weight: bold; color: #2ecc71; }
        
        .rating-box { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .rating-row { display: flex; align-items: center; justify-content: space-between; background: #383838; padding: 10px; border-radius: 8px; }

        .stars { display: flex; direction: row-reverse; gap: 5px; }
        .stars input { display: none; }
        .stars label { font-size: 28px; color: #555; cursor: pointer; transition: color 0.2s; }
        .stars input:checked ~ label, .stars label:hover, .stars label:hover ~ label { color: #f1c40f; }
        
        .btn-salvar { 
            background: #e74c3c; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-salvar:hover { background: #c0392b; }
        
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
    </style>
</head>
<body>

    <h1>Minha Coleção: 1001 Discos</h1>
    <div id="carregando">Sincronizando com a planilha... aguenta aí, mermão!</div>
    <div id="lista-discos"></div>

    <script>
        // Use a sua URL do Apps Script aqui
        const URL_API = "https://script.google.com/macros/s/AKfycbzbNp4QIWH9wuAoqgCkhK8Hh8PNaKQ8N8ksUk1HOKocpPRQY16b-DY3NR-62-dnKpuzpw/exec"; 

        // Carregar dados ao iniciar
        fetch(URL_API)
            .then(response => response.json())
            .then(dados => {
                document.getElementById('carregando').style.display = 'none';
                renderizarDiscos(dados);
            })
            .catch(err => {
                document.getElementById('carregando').innerHTML = "Deu zebra ao carregar os dados. Verifica a conexão!";
                console.error(err);
            });

        function renderizarDiscos(discos) {
            const container = document.getElementById('lista-discos');
            
            // Loop em TODOS os discos (sem o slice de 10)
            discos.forEach(disco => { 
                const card = document.createElement('div');
                card.className = 'album-card';
                
                // Formata o ID com zeros à esquerda para ficar padrão engenharia
                const idFormatado = disco.ID.toString().padStart(4, '0');
                const statusAtual = disco.STATUS === "Ouvido" ? `<span class="status-tag">✔ Ouvido</span>` : `<span style="color: #999;">Pendente</span>`;

                card.innerHTML = `
                    <div class="info-layout">
                        <h3>#${idFormatado} - ${disco.ALBUM}</h3>
                        <div>${statusAtual}</div>
                    </div>
                    <p style="margin-top: -10px; color: #bbb;"><strong>${disco.ARTISTA}</strong> — Década de ${disco.DÉCADA}</p>
                    <p style="font-size: 12px; color: #888;">Última escuta registrada: ${disco['DATA DA ESCUTA'] || "Nunca"}</p>
                    
                    <div class="rating-box">
                        <div class="rating-row">
                            <span>Qualidade Técnica:</span>
                            <div class="stars">
                                ${gerarEstrelas(disco.ID, 'mus')}
                            </div>
                        </div>

                        <div class="rating-row">
                            <span>Gosto Pessoal:</span>
                            <div class="stars">
                                ${gerarEstrelas(disco.ID, 'pes')}
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn-salvar" onclick="salvarNota(${disco.ID})">Registrar no Sistema</button>
                `;
                container.appendChild(card);
            });
        }

        // Função auxiliar para criar o HTML das estrelas
        function gerarEstrelas(id, prefixo) {
            let html = '';
            for (let i = 5; i >= 1; i--) {
                html += `
                    <input type="radio" id="${prefixo}${i}_${id}" name="${prefixo}_${id}" value="${i}">
                    <label for="${prefixo}${i}_${id}">★</label>
                `;
            }
            return html;
        }

        function salvarNota(id) {
            const notaMusical = document.querySelector(`input[name="mus_${id}"]:checked`)?.value || 0;
            const notaPessoal = document.querySelector(`input[name="pes_${id}"]:checked`)?.value || 0;

            if(notaMusical == 0 || notaPessoal == 0) {
                alert("Não esquece de dar as notas antes de salvar, parceiro!");
                return;
            }

            // Mostra um feedback visual de carregamento no botão
            const btn = event.target;
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = "Gravando...";
            btn.disabled = true;

            fetch(URL_API, {
                method: 'POST',
                body: JSON.stringify({
                    id: id,
                    notaMusical: notaMusical,
                    notaPessoal: notaPessoal
                })
            })
            .then(res => res.text())
            .then(msg => {
                alert("Notas enviadas com sucesso pra planilha!");
                location.reload(); 
            })
            .catch(err => {
                alert("Houve um erro no processo. Tenta de novo!");
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
